syntax = "proto3";

package executor;

option go_package = "./executor";

service Executor {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc CancelOrders(CancelOrdersRequest) returns (CancelOrdersResponse);
  rpc ApplyOrderEvent(ApplyOrderEventRequest) returns (ApplyOrderEventResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string message = 1;
  ResponseNotice notice = 2;
}

message ResponseNotice {
  bool success = 1;
  string code = 2;
  string message = 3;
  string hint = 4;
  string stage = 5;
}

message CreateOrderRequest {
  int64 chainId = 1;
  string settlementAddress = 2;
  string orderHash = 3;
  string maker = 4;
  string inputToken = 5;
  string outputToken = 6;
  string amountIn = 7;
  string minAmountOut = 8;
  string triggerPriceX18 = 9;
  string expiry = 10;
  string nonce = 11;
  string recipient = 12;
  string signature = 13;
  string source = 14;
}

message CreateOrderResponse {
  GetOrderResponse order = 1;
  ResponseNotice notice = 2;
}

message CancelOrderItem {
  int64 chainId = 1;
  string settlementAddress = 2;
  string orderHash = 3;
  string maker = 4;
  string reason = 5;
}

message CancelOrdersRequest {
  repeated CancelOrderItem orders = 1;
  string deadline = 2;
  string cancelSignature = 3;
}

message CancelOrdersResult {
  int64 chainId = 1;
  string settlementAddress = 2;
  string orderHash = 3;
  bool cancelled = 4;
  string error = 5;
  string code = 6;
  string message = 7;
  string hint = 8;
  string stage = 9;
  GetOrderResponse order = 10;
}

message CancelOrdersResponse {
  uint32 total = 1;
  uint32 cancelledCount = 2;
  repeated CancelOrdersResult results = 3;
  ResponseNotice notice = 4;
}

message ApplyOrderEventRequest {
  int64 chainId = 1;
  string contractAddress = 2;
  string eventName = 3;
  string txHash = 4;
  int64 blockNumber = 5;
  string orderHash = 6;
}

message ApplyOrderEventResponse {
  GetOrderResponse order = 1;
  ResponseNotice notice = 2;
}

message GetOrderRequest {
  int64 chainId = 1;
  string settlementAddress = 2;
  string orderHash = 3;
}

message GetOrderResponse {
  uint64 id = 1;
  int64 chainId = 2;
  string settlementAddress = 3;
  string orderHash = 4;
  string maker = 5;
  string inputToken = 6;
  string outputToken = 7;
  string amountIn = 8;
  string minAmountOut = 9;
  string triggerPriceX18 = 10;
  string expiry = 11;
  string nonce = 12;
  string recipient = 13;
  string source = 14;
  string status = 15;
  string statusReason = 16;
  string submittedTxHash = 17;
  string executedTxHash = 18;
  string cancelledTxHash = 19;
  int64 lastCheckedBlock = 20;
  string createdAt = 21;
  string updatedAt = 22;
  ResponseNotice notice = 23;
}
