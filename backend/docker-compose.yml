services:
  postgres:
    image: postgres:17
    container_name: fluxswap-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fluxswap_backend
      POSTGRES_USER: fluxswap
      POSTGRES_PASSWORD: fluxswap_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxswap -d fluxswap_backend"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxswap-backend-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./executor.docker.yaml:/app/executor.docker.yaml:ro
    command: ["migrate", "-f", "/app/executor.docker.yaml"]
    restart: "no"

  rpc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxswap-backend-rpc
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./executor.docker.yaml:/app/executor.docker.yaml:ro
    command: ["rpc", "-f", "/app/executor.docker.yaml"]
    ports:
      - "9001:9001"
      - "9100:9100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9100/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  executor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxswap-backend-worker
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./executor.docker.yaml:/app/executor.docker.yaml:ro
    command: ["executor", "-f", "/app/executor.docker.yaml"]
    ports:
      - "9101:9101"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9101/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxswap-backend-indexer
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./executor.docker.yaml:/app/executor.docker.yaml:ro
    command: ["indexer", "-f", "/app/executor.docker.yaml"]
    ports:
      - "9102:9102"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9102/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:


