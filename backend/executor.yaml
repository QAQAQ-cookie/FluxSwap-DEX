Name: fluxswap-backend.rpc
ListenOn: 0.0.0.0:9001

App:
  Name: fluxswap-backend
  Env: dev

Database:
  Driver: postgres
  DSN: postgres://fluxswap:fluxswap_dev_password@127.0.0.1:5432/fluxswap_backend?sslmode=disable
  AutoMigrate: true

Chains:
  - Name: localhost
    ChainID: 31337
    HTTPRPCURL: http://127.0.0.1:8545
    WSRPCURL: ws://127.0.0.1:8545
    SettlementAddress: "0xA51c1fc2f0D1a1b8494Ed1FE312d7C3a78Ed91C0"
    ExecutorPrivateKey: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
  - Name: sepolia
    ChainID: 11155111
    HTTPRPCURL: ""
    WSRPCURL: ""
    SettlementAddress: ""
    ExecutorPrivateKey: ""

Worker:
  ExecutorScanIntervalMs: 5000
  ExecutorBatchSize: 20
  ExecutorTxDeadlineSec: 120
  ExecutorEstimatedGasUsed: 400000
  ExecutorFeeSafetyBps: 20000
  ProtocolBlockedRetryMs: 30000
  ReceiptPollIntervalMs: 5000
  IndexerHeartbeatMs: 15000
  IndexerBackfillBlocks: 500
  ExecutorHealthListenOn: 0.0.0.0:9101
  IndexerHealthListenOn: 0.0.0.0:9102
