syntax = "proto3";

package executor;

option go_package = "./executor";

service Executor {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc CancelOrders(CancelOrdersRequest) returns (CancelOrdersResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc GetBestRoute(GetBestRouteRequest) returns (GetBestRouteResponse);
}

message ResponseNotice {
  bool success = 1;
  string code = 2;
  string message = 3;
  string hint = 4;
  string stage = 5;
}

message CreateOrderRequest {
  int64 chainId = 1;
  string settlementAddress = 2;
  string orderHash = 3;
  string maker = 4;
  string inputToken = 5;
  string outputToken = 6;
  string amountIn = 7;
  string minAmountOut = 8;
  string triggerPriceX18 = 9;
  string expiry = 10;
  string nonce = 11;
  string recipient = 12;
  string signature = 13;
  string source = 14;
  string maxExecutorRewardBps = 15;
}

message CreateOrderResponse {
  GetOrderResponse order = 1;
  ResponseNotice notice = 2;
}

message CancelOrderItem {
  int64 chainId = 1;
  string settlementAddress = 2;
  string orderHash = 3;
  string maker = 4;
  string reason = 5;
}

message CancelOrdersRequest {
  repeated CancelOrderItem orders = 1;
  string cancelTxHash = 2;
}

message CancelOrdersResult {
  int64 chainId = 1;
  string settlementAddress = 2;
  string orderHash = 3;
  bool cancelled = 4;
  string error = 5;
  string code = 6;
  string message = 7;
  string hint = 8;
  string stage = 9;
  GetOrderResponse order = 10;
}

message CancelOrdersResponse {
  uint32 total = 1;
  uint32 cancelledCount = 2;
  repeated CancelOrdersResult results = 3;
  ResponseNotice notice = 4;
}

message GetOrderRequest {
  int64 chainId = 1;
  string settlementAddress = 2;
  string orderHash = 3;
}

message GetOrderResponse {
  uint64 id = 1;
  int64 chainId = 2;
  string settlementAddress = 3;
  string orderHash = 4;
  string maker = 5;
  string inputToken = 6;
  string outputToken = 7;
  string amountIn = 8;
  string minAmountOut = 9;
  string triggerPriceX18 = 10;
  string expiry = 11;
  string nonce = 12;
  string recipient = 13;
  string source = 14;
  string status = 15;
  string statusReason = 16;
  string submittedTxHash = 17;
  string executedTxHash = 18;
  string cancelledTxHash = 19;
  int64 lastCheckedBlock = 20;
  string createdAt = 21;
  string updatedAt = 22;
  ResponseNotice notice = 23;
  string maxExecutorRewardBps = 24;
  string executorFeeToken = 25;
  string estimatedGasUsed = 26;
  string gasPriceAtQuote = 27;
  string rewardQuoteAt = 28;
  string lastRequiredExecutorReward = 29;
  string lastRewardCheckAt = 30;
  string lastExecutionCheckAt = 31;
  string lastBlockReason = 32;
  string settledAmountOut = 33;
  string settledExecutorReward = 34;
}

message GetBestRouteRequest {
  int64 chainId = 1;
  string tokenIn = 2;
  string tokenOut = 3;
  string amount = 4;
  uint32 maxHops = 5;
  RouteQuoteType quoteType = 6;
}

enum RouteQuoteType {
  ROUTE_QUOTE_TYPE_UNSPECIFIED = 0;
  ROUTE_QUOTE_TYPE_EXACT_INPUT = 1;
  ROUTE_QUOTE_TYPE_EXACT_OUTPUT = 2;
}

message RoutePath {
  repeated string tokens = 1;
  uint32 hops = 2;
  string amountIn = 3;
  string amountOut = 4;
  uint64 gasEstimate = 5;
  string gasCostInInputToken = 6;
  string gasCostInOutputToken = 7;
  string gasAdjustedAmountIn = 8;
  string gasAdjustedAmountOut = 9;
}

message RouteQuote {
  RouteQuoteType quoteType = 1;
  string amountIn = 2;
  string amountOut = 3;
}

message RouteView {
  repeated string pathTokens = 1;
  repeated string executionPath = 2;
  uint32 hops = 3;
  bool isDirect = 4;
  bool isMultiHop = 5;
  string amountIn = 6;
  string amountOut = 7;
  uint64 gasEstimate = 8;
  string gasCostInInputToken = 9;
  string gasCostInOutputToken = 10;
  string gasAdjustedAmountIn = 11;
  string gasAdjustedAmountOut = 12;
  string rankingMetric = 13;
}

message RouteExecution {
  repeated string routerPath = 1;
  bool isMultiHop = 2;
  string strategy = 3;
}

message GetBestRouteResponse {
  ResponseNotice notice = 1;
  RouteView selectedRoute = 2;
  repeated RouteView alternativeRoutes = 3;
  RouteExecution execution = 4;
  string selectionReason = 5;
  bool usedGasAdjustedRanking = 6;
  RouteQuote quote = 7;
}
