specVersion: 1.3.0
indexerHints:
  prune: auto

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: FluxSwapFactory
    network: mainnet
    source:
      address: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      abi: FluxSwapFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Token
        - Pair
      abis:
        - name: FluxSwapFactory
          file: ./abis/FluxSwapFactory.json
        - name: IERC20
          file: ./abis/IERC20.json
      eventHandlers:
        - event: PairCreated(indexed address,indexed address,address,uint256)
          handler: handlePairCreated
      file: ./src/flux-swap-factory.ts

templates:
  - kind: ethereum
    name: FluxSwapPair
    network: mainnet
    source:
      abi: FluxSwapPair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Pair
        - SwapEvent
        - MintEvent
        - BurnEvent
      abis:
        - name: FluxSwapPair
          file: ./abis/FluxSwapPair.json
      eventHandlers:
        - event: Mint(indexed address,uint256,uint256)
          handler: handleMint
        - event: Burn(indexed address,uint256,uint256,indexed address)
          handler: handleBurn
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
        - event: Sync(uint112,uint112)
          handler: handleSync
      file: ./src/flux-swap-pair.ts
