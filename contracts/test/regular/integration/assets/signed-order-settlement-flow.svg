<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" role="img" aria-labelledby="title desc">
  <title id="title">FluxSignedOrderSettlementFlow</title>
  <desc id="desc">FluxSignedOrderSettlementFlow flow diagram</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FBFCFE" />
      <stop offset="100%" stop-color="#F1F5FA" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.15" fill="#D7E1ED" opacity="0.48" />
    </pattern>
    <filter id="cardShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#243B5514" />
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10.4" refY="6.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 1.2 1.2 L 10.4 6.5 L 1.2 11.8 L 3.8 6.5 Z" fill="#93A9C0" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="300" rx="28" fill="url(#bg)" />
  <rect x="0" y="0" width="1280" height="300" rx="28" fill="url(#dots)" opacity="0.32" />

  <rect x="34" y="28" width="96" height="24" rx="12" fill="#17314D" />
  <text x="82" y="44" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="11" font-weight="700" letter-spacing="0.6" fill="#FFFFFF">测试流程</text>
  <text x="34" y="84" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="25" font-weight="700" fill="#1D3148">FluxSignedOrderSettlementFlow</text>
  <text x="34" y="108" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="12" fill="#698096">链下签名订单在链上完成验签、到价检查与 AMM 真实结算</text>

  <path d="M 246 170 L 280 170" fill="none" stroke="#93A9C0" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M 486 170 L 520 170" fill="none" stroke="#93A9C0" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M 726 170 L 760 170" fill="none" stroke="#93A9C0" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M 966 170 L 1000 170" fill="none" stroke="#93A9C0" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)" />

  <g filter="url(#cardShadow)">
    <rect x="40" y="120" width="206" height="100" rx="26" fill="#EAF1FF" />
    <rect x="48" y="128" width="190" height="84" rx="20" fill="#FFFFFF" stroke="#C9D9FF" stroke-width="1.6" />
    <circle cx="68" cy="144" r="12" fill="#4B73F2" />
    <text x="68" y="148.5" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">A</text>
    <text x="98" y="166" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="15" font-weight="700" fill="#2142A8">Maker 链下签名</text>
    <text x="98" y="188" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#59708E">订单参数、nonce、</text>
    <text x="98" y="206" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#59708E">触发价格与接收方</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="280" y="120" width="206" height="100" rx="26" fill="#EAF8F4" />
    <rect x="288" y="128" width="190" height="84" rx="20" fill="#FFFFFF" stroke="#BFE8DE" stroke-width="1.6" />
    <circle cx="308" cy="144" r="12" fill="#179986" />
    <text x="308" y="148.5" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">B</text>
    <text x="338" y="166" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="15" font-weight="700" fill="#0F6258">Watcher / Executor</text>
    <text x="338" y="188" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#557D75">链下判断到价后</text>
    <text x="338" y="206" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#557D75">发起 executeOrder</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="520" y="120" width="206" height="100" rx="26" fill="#FFF5E3" />
    <rect x="528" y="128" width="190" height="84" rx="20" fill="#FFFFFF" stroke="#F2D49C" stroke-width="1.6" />
    <circle cx="548" cy="144" r="12" fill="#DA9400" />
    <text x="548" y="148.5" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">C</text>
    <text x="578" y="166" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="15" font-weight="700" fill="#9A6100">SignedOrderSettlement</text>
    <text x="578" y="188" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#8A7140">验签、检查 nonce /</text>
    <text x="578" y="206" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#8A7140">expiry / trigger / minOut</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="760" y="120" width="206" height="100" rx="26" fill="#FFF0EC" />
    <rect x="768" y="128" width="190" height="84" rx="20" fill="#FFFFFF" stroke="#F4C1B5" stroke-width="1.6" />
    <circle cx="788" cy="144" r="12" fill="#E46644" />
    <text x="788" y="148.5" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">D</text>
    <text x="818" y="166" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="15" font-weight="700" fill="#B34A2E">Router + Pair</text>
    <text x="818" y="188" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#8C6258">走真实 AMM 路径</text>
    <text x="818" y="206" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#8C6258">完成 Token / ETH 结算</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1000" y="120" width="206" height="100" rx="26" fill="#EEF3F8" />
    <rect x="1008" y="128" width="190" height="84" rx="20" fill="#FFFFFF" stroke="#CAD6E4" stroke-width="1.6" />
    <circle cx="1028" cy="144" r="12" fill="#647891" />
    <text x="1028" y="148.5" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">E</text>
    <text x="1058" y="166" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="15" font-weight="700" fill="#2F425A">Recipient / State</text>
    <text x="1058" y="188" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#5C7084">接收成交结果并</text>
    <text x="1058" y="206" font-family="'Trebuchet MS','Segoe UI','Microsoft YaHei',sans-serif" font-size="13" fill="#5C7084">锁定订单哈希与 nonce</text>
  </g>
</svg>
